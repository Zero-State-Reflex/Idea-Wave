<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Wave</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    canvas { display: block; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      pointer-events: none;
    }
    #labels {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .wave-label {
      position: absolute;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      text-shadow: 0 0 8px currentColor, 0 0 20px currentColor;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* ── Audio controls ── */
    #audio-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    #speaker-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    #speaker-btn:hover { opacity: 1; }
    #speaker-btn svg { width: 22px; height: 22px; fill: #fff; }

    #volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(255,255,255,0.4);
    }
    #volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(255,255,255,0.4);
    }

    #track-info {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Hidden SC iframe */
    #sc-player { display: none; }
  </style>
</head>
<body>
  <div id="labels"></div>
  <div id="info">Drag to rotate &bull; Scroll to zoom</div>

  <!-- SoundCloud widget (hidden) -->
  <iframe id="sc-player"
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fiandothers%2Fthe-human-condition&auto_play=false&show_artwork=false&visual=false">
  </iframe>

  <!-- Audio controls -->
  <div id="audio-controls">
    <div id="track-info">The Human Condition</div>
    <button id="speaker-btn" title="Play / Pause">
      <!-- Speaker icon (muted state initially) -->
      <svg id="icon-muted" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v1.79l2.48 2.48c.01-.08.02-.16.02-.24zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3z"/>
      </svg>
      <svg id="icon-playing" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
    </button>
    <input id="volume-slider" type="range" min="0" max="100" value="40" title="Volume">
  </div>

  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script>
    // SoundCloud Widget API control
    const widget = SC.Widget('sc-player');
    const speakerBtn = document.getElementById('speaker-btn');
    const iconMuted = document.getElementById('icon-muted');
    const iconPlaying = document.getElementById('icon-playing');
    const volumeSlider = document.getElementById('volume-slider');
    let isPlaying = false;

    widget.bind(SC.Widget.Events.READY, () => {
      widget.setVolume(parseInt(volumeSlider.value));
    });

    speakerBtn.addEventListener('click', () => {
      if (isPlaying) {
        widget.pause();
        isPlaying = false;
        iconMuted.style.display = '';
        iconPlaying.style.display = 'none';
      } else {
        widget.play();
        isPlaying = true;
        iconMuted.style.display = 'none';
        iconPlaying.style.display = '';
      }
    });

    volumeSlider.addEventListener('input', () => {
      widget.setVolume(parseInt(volumeSlider.value));
    });

    widget.bind(SC.Widget.Events.FINISH, () => {
      // Loop the track
      widget.seekTo(0);
      widget.play();
    });
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
